<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Rouxe Box</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { text-align: center; margin-bottom: 24px; font-size: 2rem; color: #f59e0b; }
    .subtitle { text-align: center; color: #d1d5db; margin-bottom: 24px; }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }
    .panel {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h2 { margin-bottom: 16px; color: #fbbf24; }
    .player-card {
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .current-track { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
    .current-status { color: #d1d5db; margin-bottom: 16px; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: bold;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-2px); opacity: .95; }
    .btn-primary { background: #f59e0b; color: #111827; }
    .btn-secondary { background: #374151; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    label { display: block; margin-bottom: 6px; color: #d1d5db; font-size: .9rem; }
    input[type="range"] { width: 100%; cursor: pointer; }
    .progress-wrapper, .volume-wrapper { margin-bottom: 16px; }
    .playlist { display: grid; gap: 10px; max-height: 520px; overflow-y: auto; padding-right: 6px; }
    .track-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .track-info { display: flex; flex-direction: column; gap: 4px; }
    .track-title { font-weight: bold; }
    .track-subtitle { font-size: .85rem; color: #9ca3af; }
    .soundboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .sfx-btn {
      min-height: 78px;
      font-size: 1rem;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 18px rgba(0,0,0,0.2);
    }
    .footer-note { margin-top: 16px; color: #9ca3af; font-size: .9rem; line-height: 1.5; }
    code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; }
    @media (max-width: 980px) { .container { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      body { padding: 14px; }
      .soundboard-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>🎵 La Rouxe Box</h1>
  <div class="subtitle">Jukebox & bruitages pour le défilé</div>

  <div class="container">
    <section class="panel">
      <h2>Lecteur principal</h2>
      <div class="player-card">
        <div class="current-track" id="currentTrack">Chargement des musiques...</div>
        <div class="current-status" id="currentStatus">Préparation de la playlist</div>

        <div class="controls">
          <button class="btn-primary" id="playBtn">▶ Lecture</button>
          <button class="btn-secondary" id="pauseBtn">⏸ Pause</button>
          <button class="btn-secondary" id="prevBtn">⏮ Précédent</button>
          <button class="btn-secondary" id="nextBtn">⏭ Suivant</button>
          <button class="btn-danger" id="stopBtn">⏹ Stop</button>
        </div>

        <div class="progress-wrapper">
          <label for="progressBar">Progression</label>
          <input type="range" id="progressBar" min="0" max="100" value="0" />
        </div>

        <div class="volume-wrapper">
          <label for="volumeBar">Volume musique</label>
          <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="0.8" />
        </div>
      </div>

      <h2>Playlist</h2>
      <div class="playlist" id="playlist"></div>
    </section>

    <section class="panel">
      <h2>Bruitages</h2>
      <div class="soundboard-grid" id="soundboard"></div>
      <p class="footer-note">
        Pour ajouter des sons, mets tes fichiers dans <code>audio/</code> ou <code>sfx/</code>, puis ajoute juste une ligne dans <code>tracks.json</code> ou <code>sfx.json</code>.
      </p>
    </section>
  </div>

  <audio id="mainAudio"></audio>

  <script>
    let tracks = [];
    let soundEffects = [];
    const mainAudio = document.getElementById('mainAudio');
    const playlist = document.getElementById('playlist');
    const soundboard = document.getElementById('soundboard');
    const currentTrack = document.getElementById('currentTrack');
    const currentStatus = document.getElementById('currentStatus');
    const progressBar = document.getElementById('progressBar');
    const volumeBar = document.getElementById('volumeBar');
    let currentIndex = 0;

    async function loadData() {
      try {
        const [tracksRes, sfxRes] = await Promise.all([
          fetch('tracks.json'),
          fetch('sfx.json')
        ]);

        if (!tracksRes.ok || !sfxRes.ok) {
          throw new Error('Impossible de charger les fichiers JSON');
        }

        tracks = await tracksRes.json();
        soundEffects = await sfxRes.json();

        renderPlaylist();
        renderSoundboard();

        if (tracks.length > 0) {
          loadTrack(0);
          currentStatus.textContent = 'Prête à être lue';
        } else {
          currentTrack.textContent = 'Aucune musique trouvée';
          currentStatus.textContent = 'Ajoute une entrée dans tracks.json';
        }
      } catch (error) {
        currentTrack.textContent = 'Erreur de chargement';
        currentStatus.textContent = 'Vérifie tracks.json et sfx.json';
        console.error(error);
      }
    }

    function renderPlaylist() {
      playlist.innerHTML = '';

      if (tracks.length === 0) {
        playlist.innerHTML = '<div class="track-item"><div class="track-info"><div class="track-title">Aucune musique</div><div class="track-subtitle">Ajoute un élément dans tracks.json</div></div></div>';
        return;
      }

      tracks.forEach((track, index) => {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.innerHTML = `
          <div class="track-info">
            <div class="track-title">${track.title || 'Sans titre'}</div>
            <div class="track-subtitle">${track.artist || 'Artiste inconnu'}</div>
          </div>
          <button class="btn-primary">Jouer</button>
        `;

        item.querySelector('button').addEventListener('click', () => {
          loadTrack(index);
          mainAudio.play();
          currentStatus.textContent = 'Lecture en cours';
        });

        playlist.appendChild(item);
      });
    }

    function renderSoundboard() {
      soundboard.innerHTML = '';

      if (soundEffects.length === 0) {
        soundboard.innerHTML = '<div class="track-item"><div class="track-info"><div class="track-title">Aucun bruitage</div><div class="track-subtitle">Ajoute un élément dans sfx.json</div></div></div>';
        return;
      }

      soundEffects.forEach((effect) => {
        const btn = document.createElement('button');
        btn.className = 'sfx-btn';
        btn.textContent = effect.name || 'Bruitage';
        btn.addEventListener('click', () => {
          const sfx = new Audio(effect.file);
          sfx.volume = 1;
          sfx.play();
        });
        soundboard.appendChild(btn);
      });
    }

    function loadTrack(index) {
      if (tracks.length === 0) return;
      currentIndex = index;
      mainAudio.src = tracks[index].file;
      currentTrack.textContent = `${tracks[index].title || 'Sans titre'} — ${tracks[index].artist || 'Artiste inconnu'}`;
      currentStatus.textContent = 'Prête à être lue';
      progressBar.value = 0;
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      if (tracks.length === 0) return;
      if (!mainAudio.src) loadTrack(currentIndex);
      mainAudio.play();
      currentStatus.textContent = 'Lecture en cours';
    });

    document.getElementById('pauseBtn').addEventListener('click', () => {
      mainAudio.pause();
      currentStatus.textContent = 'En pause';
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      mainAudio.pause();
      mainAudio.currentTime = 0;
      currentStatus.textContent = 'Arrêtée';
      progressBar.value = 0;
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (tracks.length === 0) return;
      currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
      loadTrack(currentIndex);
      mainAudio.play();
      currentStatus.textContent = 'Lecture en cours';
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (tracks.length === 0) return;
      currentIndex = (currentIndex + 1) % tracks.length;
      loadTrack(currentIndex);
      mainAudio.play();
      currentStatus.textContent = 'Lecture en cours';
    });

    volumeBar.addEventListener('input', () => {
      mainAudio.volume = volumeBar.value;
    });

    mainAudio.addEventListener('timeupdate', () => {
      if (!isNaN(mainAudio.duration) && mainAudio.duration > 0) {
        progressBar.value = (mainAudio.currentTime / mainAudio.duration) * 100;
      }
    });

    progressBar.addEventListener('input', () => {
      if (!isNaN(mainAudio.duration) && mainAudio.duration > 0) {
        mainAudio.currentTime = (progressBar.value / 100) * mainAudio.duration;
      }
    });

    mainAudio.addEventListener('ended', () => {
      if (tracks.length === 0) return;
      currentIndex = (currentIndex + 1) % tracks.length;
      loadTrack(currentIndex);
      mainAudio.play();
      currentStatus.textContent = 'Lecture en cours';
    });

    mainAudio.volume = volumeBar.value;
    loadData();
  </script>
</body>
</html>
